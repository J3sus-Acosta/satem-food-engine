services:
  postgres:
    image: postgres:16

    container_name: satem-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: satem
      POSTGRES_PASSWORD: satem123
      POSTGRES_DB: satem_food

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: